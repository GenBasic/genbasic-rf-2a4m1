# RF-2A4M1 driver-binding configuration.
#
# The RF-2A4M1 adapter shares a USB device-ID range with the generic in-kernel
# driver. Prevent that driver from auto-loading so the DKMS driver (rf_2a4m1)
# claims the device. This is the standard DKMS out-of-tree override.

blacklist mt7601u

# Optional hardening: also refuse any manual or dependency load of the generic
# driver. Note this is host-wide — enable only on a dedicated product host that
# owns no other device served by that driver.
# install mt7601u /bin/false
