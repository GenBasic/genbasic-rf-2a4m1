# DKMS manifest for the rf-2a4m1 (GenBasic RF-2A4M1) USB Wi-Fi driver.
#
# The whole driver is GPL source; DKMS compiles it from source against the
# installed kernel(s). No prebuilt object, no per-arch package (Architecture: all).
# PACKAGE_VERSION tracks the VERSION file (regenerated by `make version`).

PACKAGE_NAME="rf-2a4m1"
PACKAGE_VERSION="1.0.0"

CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
MAKE[0]="make -j$(nproc) KVER=${kernelver} -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"

BUILT_MODULE_NAME[0]="rf-2a4m1"          # builds rf-2a4m1.ko (runtime name rf_2a4m1: '-' -> '_')
DEST_MODULE_LOCATION[0]="/updates/dkms"  # /lib/modules/<kver>/updates/dkms/ — ranks above in-tree
AUTOINSTALL="yes"                        # rebuild automatically on kernel upgrade

# Supported-series floor: skip (do not error) on kernels below the compat matrix.
BUILD_EXCLUSIVE_KERNEL="^(4\.1[5-9]|4\.[2-9][0-9]|[5-9]\.|[1-9][0-9]\.)"
